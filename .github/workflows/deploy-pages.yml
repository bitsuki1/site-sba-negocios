name: Deploy ao GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas para publicar no Pages via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; não cancela um deploy em andamento
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Build (base = nome do repositório)
        run: npm run build
        env:
          # Projeto serve sob /<repo>/ — ex.: /site-sba-negocios/
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Fallback de SPA (deep links / refresh)
        run: cp dist/index.html dist/404.html

      - name: Configurar Pages (habilita no primeiro run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
