name: Deploy de produção (GitHub Pages)

# Auto-deploy do site no domínio próprio sbanegocios.com.br quando a main muda.
# Requer (uma vez), nas Settings do repo:
#   - Actions > General > Workflow permissions = "Read and write"
#   - Pages > Build and deployment > Source = "GitHub Actions"
# Enquanto isso não estiver ligado, o deploy é manual: scripts/deploy-producao.sh

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas para publicar no Pages via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; não cancela um deploy em andamento
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Build de produção (base "/", domínio próprio)
        run: npm run build
        # SEM BASE_PATH → base "/" (apex sbanegocios.com.br)

      - name: Domínio próprio + fallback de SPA
        run: |
          printf 'sbanegocios.com.br\n' > dist/CNAME
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
